<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ActionNote{% endblock %}</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%93%9D</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <script>
        // Initialize theme immediately to prevent flash
        (function() {
            const stored = localStorage.getItem('theme-mode');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = stored ? stored === 'dark' : systemDark;
            
            if (isDark) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>

    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>📝 ActionNote</h1>
                <p class="tagline">AI-Powered Task Management</p>
            </div>
            <ul class="nav-menu">
                <li><a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">Dashboard</a></li>
                <li><a href="{{ url_for('notes_page') }}" class="{% if request.endpoint == 'notes_page' %}active{% endif %}">Notes</a></li>
                <li><a href="{{ url_for('add_note_page') }}" class="{% if request.endpoint == 'add_note_page' %}active{% endif %}">Add Note</a></li>
                <li><a href="{{ url_for('settings') }}" class="{% if request.endpoint == 'settings' %}active{% endif %}">Settings</a></li>
                <li class="nav-divider"></li>
                <li><button id="theme-toggle" class="theme-toggle" title="Toggle Dark/Light Mode" aria-label="Toggle Dark/Light Mode">🌙</button></li>
                <li><a href="{{ url_for('profile') }}" class="{% if request.endpoint == 'profile' %}active{% endif %}">👤 {{ current_user.username }}</a></li>
                <li><a href="{{ url_for('logout') }}" class="logout-link">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 ActionNote MVP | Built with Flask & OpenAI</p>
        </div>
    </footer>

    <script>
    (function() {
        // Attach the CSRF token to every non-GET fetch() call so both
        // script.js's apiRequest() helper and the inline fetch() calls in
        // individual templates are covered without per-call-site changes.
        var token = document.querySelector('meta[name="csrf-token"]').content;
        var originalFetch = window.fetch;
        window.fetch = function(url, options) {
            options = options || {};
            var method = (options.method || 'GET').toUpperCase();
            if (['GET', 'HEAD', 'OPTIONS'].indexOf(method) === -1) {
                options.headers = Object.assign({}, options.headers, {'X-CSRFToken': token});
            }
            return originalFetch(url, options);
        };
    })();

    // Theme toggle functionality
    (function() {
        const themeToggle = document.getElementById('theme-toggle');
        
        function setTheme(isDark) {
            const theme = isDark ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme-mode', theme);
            themeToggle.textContent = isDark ? '☀️' : '🌙';
        }
        
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const isDark = current === 'dark';
            setTheme(!isDark);
        }
        
        // Initialize button state
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        themeToggle.textContent = isDark ? '☀️' : '🌙';
        
        themeToggle.addEventListener('click', toggleTheme);
    })();
    </script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
